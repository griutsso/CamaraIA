# ═══════════════════════════════════════════════════════════════
#  IA-CAM-SERVICE — Configuracion de herramientas de desarrollo
# ═══════════════════════════════════════════════════════════════

[flake8]
max-line-length = 100
extend-ignore = E203, W503
exclude =
    venv,
    __pycache__,
    data,
    logs,
    .eggs,
    build

[isort]
profile = black
line_length = 100
known_first_party = src

[mypy]
python_version = 3.10
ignore_missing_imports = True
no_strict_optional = True
exclude = (venv|data|logs)/

[tool:pytest]
testpaths = tests
addopts = -v --tb=short
python_files = test_*.py
python_functions = test_*
