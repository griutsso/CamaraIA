log_level: INFO
camera:
  source: 0
  width: 1920
  height: 1080
  fps: 24
  buffer_size: 30
  reconnect_attempts: 5
  reconnect_delay: 2.0
detection:
  face_enabled: false
  plate_enabled: false
  face_model: yolov8n-face.pt
  plate_model: yolov8n-plate.pt
  confidence_threshold: 0.5
  face_min_size: 40
  plate_min_size: 60
  tracking_iou_threshold: 0.4
  duplicate_cooldown: 3.0
storage:
  database_path: data/detections.db
  images_path: data/captures
  encryption_enabled: true
  max_storage_mb: 5120
  rotation_threshold: 0.8
ui:
  theme: dark
  window_width: 1280
  window_height: 800
  sidebar_width: 260
  font_family: SF Pro Display
  font_fallback: Helvetica Neue
  accent_color: '#0A84FF'
  show_fps: true
  show_bounding_boxes: true
